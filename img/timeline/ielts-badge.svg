<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
<title id="title">IELTS score badge</title>
<desc id="desc">Clean IELTS visual badge showing overall score 7.5 and CEFR C1.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fffaf3"/>
    <stop offset="1" stop-color="#eef3ff"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1">
    <stop offset="0" stop-color="#7c3aed"/>
    <stop offset="1" stop-color="#2563eb"/>
  </linearGradient>
</defs>
<rect width="900" height="560" rx="58" fill="url(#bg)"/>
<circle cx="740" cy="105" r="170" fill="#2563eb" opacity="0.08"/>
<circle cx="150" cy="455" r="180" fill="#7c3aed" opacity="0.07"/>
<text x="80" y="145" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800" fill="#111827">IELTS</text>
<text x="82" y="205" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6" fill="#64748b">ACADEMIC ENGLISH</text>
<rect x="80" y="260" width="220" height="170" rx="36" fill="url(#accent)"/>
<text x="190" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="white">OVERALL</text>
<text x="190" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="white">7.5</text>
<rect x="330" y="260" width="185" height="170" rx="36" fill="#111827" opacity="0.92"/>
<text x="423" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="white">CEFR</text>
<text x="423" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="white">C1</text>
<g font-family="Inter, Arial, sans-serif" font-weight="800" font-size="28" fill="#111827">
  <text x="575" y="290">Listening 9</text>
  <text x="575" y="335">Reading 8</text>
  <text x="575" y="380">Writing 6.5</text>
  <text x="575" y="425">Speaking 6</text>
</g>
</svg>